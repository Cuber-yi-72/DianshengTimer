<!DOCTYPE html>
<!--
    点盛魔方计时器 - Web应用

    浏览器兼容性要求:
    - Chrome/Edge: 90+ (推荐)
    - Firefox: 88+ (推荐)
    - Safari: 14+ (推荐)
    - 移动浏览器: iOS Safari 14+, Chrome Mobile 90+

    需要的现代JavaScript特性:
    - ES6+ (class, arrow functions, template literals, destructuring, spread operator)
    - DOM API (classList, dataset, querySelector, querySelectorAll)
    - Storage API (localStorage)
    - CSS3 (Flexbox, Grid, CSS Variables, Transitions)

    如需支持旧版浏览器，请添加以下polyfill:
    - classList.js (IE9-)
    - dataset.js (IE9-)
    - es5-shim.js (ES5兼容)
    - es6-shim.js (ES6兼容)
    - css-vars-ponyfill.js (CSS变量支持)

    性能优化:
    - 使用DOM缓存减少DOM查询
    - 使用CSS变量实现主题切换
    - 使用requestAnimationFrame优化动画
    - 使用事件委托减少事件监听器数量

    可访问性:
    - 支持键盘导航 (Tab, Enter, Space, Escape)
    - 支持屏幕阅读器 (ARIA标签)
    - 支持高对比度模式
    - 支持文字缩放
-->
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔方计时器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./css/styles.css">
</head>
<body data-theme="light">
    <!-- 全屏计时器 -->
    <div class="fullscreen-timer" id="fullscreenTimer" tabindex="-1" aria-live="polite">
        <div class="fullscreen-display" id="fullscreenDisplay" role="timer" aria-live="off">15</div>
        <div class="fullscreen-info" id="fullscreenInfo">准备计时...</div>
        <div class="fullscreen-hint" id="fullscreenHint"></div>
        <button class="fullscreen-exit-btn" id="fullscreenExitBtn" data-i18n="exitFullscreen" title="退出全屏" aria-label="退出全屏" aria-keyshortcuts="Escape">
            <i class="fas fa-times" aria-hidden="true"></i>
        </button>
    </div>

    <!-- ESC提示 -->
    <div class="esc-hint" id="escHint" role="status" aria-live="polite">
        按 <span class="esc-key">ESC</span> 键取消观察
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-modal" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-overlay" id="settingsOverlay" aria-hidden="true"></div>
        <div class="settings-content" role="document">
            <div class="settings-header">
                <h3 id="settingsTitle">设置</h3>
                <button class="settings-close-btn" id="settingsCloseBtn" aria-label="关闭设置" aria-keyshortcuts="Escape">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <div class="settings-body">
                <!-- 主题设置 -->
                <div class="settings-section" role="group" aria-labelledby="themeTitle">
                    <div class="settings-section-title" id="themeTitle">主题</div>
                    <div class="settings-options" role="radiogroup" aria-label="选择主题">
                        <button class="theme-option-btn" data-theme="dark" id="themeDarkBtn" role="radio" aria-checked="true" aria-label="深色模式">
                            <i class="fas fa-moon" aria-hidden="true"></i>
                            <span id="darkThemeText">深色模式</span>
                        </button>
                        <button class="theme-option-btn" data-theme="light" id="themeLightBtn" role="radio" aria-checked="false" aria-label="浅色模式">
                            <i class="fas fa-sun" aria-hidden="true"></i>
                            <span id="lightThemeText">浅色模式</span>
                        </button>
                    </div>
                </div>

                <!-- 语言设置 -->
                <div class="settings-section" role="group" aria-labelledby="languageTitle">
                    <div class="settings-section-title" id="languageTitle">语言</div>
                    <div class="settings-options" role="radiogroup" aria-label="选择语言">
                        <button class="lang-option-btn" data-lang="zh-CN" id="langSCBtn" role="radio" aria-checked="true" aria-label="简体中文">
                            <span id="langSCText">简体中文</span>
                        </button>
                        <button class="lang-option-btn" data-lang="zh-TW" id="langTCBtn" role="radio" aria-checked="false" aria-label="繁體中文">
                            <span id="langTCText">繁體中文</span>
                        </button>
                        <button class="lang-option-btn" data-lang="en" id="langENBtn" role="radio" aria-checked="false" aria-label="English">
                            <span id="langENText">English</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 原有隐藏元素（保持JavaScript兼容性） -->
    <div class="theme-controls" aria-hidden="true">
        <button class="theme-btn active" data-theme="dark" data-i18n="blackTheme" title="黑色主题" aria-label="黑色主题">
            <i class="fas fa-moon" aria-hidden="true"></i>
        </button>
        <button class="theme-btn" data-theme="light" data-i18n="whiteTheme" title="白色主题" aria-label="白色主题">
            <i class="fas fa-sun" aria-hidden="true"></i>
        </button>
    </div>

    <div class="tool-buttons" aria-hidden="true">
        <button class="tool-btn sound-btn" id="soundBtn" data-i18n="soundToggle" title="音效开关" aria-label="音效开关">
            <i class="fas fa-volume-up" aria-hidden="true"></i>
        </button>
    </div>

    <div class="notification" id="notification" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- 新的UI布局 -->
    <div class="container" role="main">
        <!-- 移动端顶部控制栏 -->
        <div class="top-controls-mobile">
            <!-- 第一行：标题和主题切换 -->
            <div class="header-row-mobile">
                <!-- 大标题区 -->
                <div class="header" role="banner">
                    <img src="./pictures/diansheng.png" alt="点盛" class="header-logo">
                    <div class="header-title">魔方计时器</div>
                </div>

                <!-- 设置按钮 -->
                <button class="theme-toggle-btn" id="settingsBtn" title="设置" aria-label="打开设置" aria-keyshortcuts="Ctrl+,">
                    <i class="fas fa-cog" aria-hidden="true"></i>
                </button>
            </div>

            <!-- 第二行：魔方类型选择器和导航按钮 -->
            <div class="controls-row-mobile">
                <select class="cube-type-selector" id="cubeTypeSelect" aria-label="选择魔方类型" tabindex="0">
                    <option value="corner">转角三阶</option>
                    <option value="octahedron">双子八面体</option>
                    <option value="cornerOcta">转角八面体</option>
                    <option value="twinOctahedron">二阶转面八面体</option>
                </select>
                <button class="prev-scramble-btn" id="prevScrambleBtn" aria-label="上一条打乱公式" tabindex="0">上一条</button>
                <button class="next-scramble-btn" id="nextScrambleBtn" aria-label="下一条打乱公式" tabindex="0">下一条</button>
                <button class="stats-float-btn" id="statsFloatBtn" title="查看成绩统计" aria-label="查看成绩统计" data-i18n="stats">
                    成绩
                </button>
            </div>
        </div>

        <!-- 打乱控制选项区 -->
        <div class="scramble-controls-section" role="region" aria-label="打乱控制">
            <!-- 转角三阶控制选项（固定4循环和15%的0操作概率） -->
            <div id="corner-scramble-controls" class="scramble-controls">
            </div>

            <!-- 转角八面体控制选项（固定打乱角块） -->
            <div id="cornerOcta-scramble-controls" class="scramble-controls" style="display: none;">
            </div>

            <!-- 双子八面体控制选项（无） -->
            <div id="octahedron-scramble-controls" class="scramble-controls" style="display: none;" aria-hidden="true">
                <!-- 双子八面体暂无额外控制选项 -->
            </div>

            <!-- 二阶转面八面体控制选项（无） -->
            <div id="twinOctahedron-scramble-controls" class="scramble-controls" style="display: none;" aria-hidden="true">
                <!-- 二阶转面八面体暂无额外控制选项 -->
            </div>

            <!-- 打乱公式显示（在控制区域内） -->
            <div class="scramble-display-section">
                <div class="scramble-number" id="scrambleNumber">#1</div>
                <div class="scramble-text" id="scrambleContent"></div>
                <button class="copy-scramble-btn" id="copyBtn">复制</button>
                <button class="coordinate-scramble-btn" id="coordinateBtn" data-i18n="coordinate">坐标</button>
            </div>
        </div>

        <!-- 移动端统计栏容器 -->
        <div class="stats-container-mobile">
            <!-- 当前成绩统计区和历史最佳成绩统计区横向排列 -->
            <div class="stats-row-mobile">
                <!-- 当前成绩统计区 -->
                <div class="current-stats-card" role="region" aria-label="当前成绩统计">
                    <div class="stats-card-title">当前成绩统计</div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="single">单次</span>
                        <span class="stat-value" id="currentTime">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="ao5">Ao5</span>
                        <span class="stat-value" id="currentAo5" aria-live="polite">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="ao12">Ao12</span>
                        <span class="stat-value" id="currentAo12" aria-live="polite">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="ao50">Ao50</span>
                        <span class="stat-value" id="currentAo50" aria-live="polite">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="ao100">Ao100</span>
                        <span class="stat-value" id="currentAo100" aria-live="polite">--</span>
                    </div>
                </div>

                <!-- 历史最佳成绩统计区 -->
                <div class="best-stats-card">
                    <div class="stats-card-title">历史最佳成绩</div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="bestSingle">最佳单次</span>
                        <span class="stat-value" id="bestTime">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="bestAo5">最佳 Ao5</span>
                        <span class="stat-value" id="bestAo5">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="bestAo12">最佳 Ao12</span>
                        <span class="stat-value" id="bestAo12">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="bestAo50">最佳 Ao50</span>
                        <span class="stat-value" id="bestAo50">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="bestAo100">最佳 Ao100</span>
                        <span class="stat-value" id="bestAo100">--</span>
                    </div>
                </div>
            </div>

            <!-- 历史成绩记录区单独一行 -->
            <div class="history-times-card">
                <div class="history-times-title">
                    <span>历史成绩</span>
                    <button class="history-reset-btn" id="historyResetBtn" title="清除所有数据">重置</button>
                </div>
                <div class="history-times-summary" id="historySummary">次数: 0 | 平均: --</div>
                <div class="history-times-list" id="historyTimesList">
                    <!-- 历史成绩将通过JavaScript动态添加 -->
                </div>
                <button class="history-export-btn" id="exportBestAo5Btn">导出所有成绩</button>
            </div>
        </div>

        <!-- 计时区 -->
        <div class="timer-main-section">
            <!-- 计时显示子区域 -->
            <div class="timer-display">
                <div class="timer-number" id="timerDisplay">00:00.00</div>
                <div class="timer-controls">
                    
                </div>
            </div>

            <!-- 魔方2D模型子区域 -->
            <div class="cube-2d-view" id="cube-2d">
                <!-- 转角三阶视图 -->
                <div class="face-container-3x3" id="face-container-3x3">
                    <div class="face-U cube-face-top" id="face-top">
                        <div class="face-label-U">上</div>
                    </div>
                    <div class="face-L cube-face-left" id="face-left">
                        <div class="face-label-L">左</div>
                    </div>
                    <div class="face-F cube-face-front" id="face-front">
                        <div class="face-label-F">前</div>
                    </div>
                    <div class="face-R cube-face-right" id="face-right">
                        <div class="face-label-R">右</div>
                    </div>
                    <div class="face-B cube-face-back" id="face-back">
                        <div class="face-label-B">后</div>
                    </div>
                    <div class="face-D cube-face-bottom" id="face-bottom">
                        <div class="face-label-D">下</div>
                    </div>
                </div>

                <!-- 双子八面体视图 -->
                <div class="face-container-octa-twin" id="face-container-octa-twin" style="display: none;">
                    <div id="twod-container" style="width: 100%; height: 100%; position: relative;">
                        <svg class="octahedron-2d" width="100%" height="100%" viewBox="0 0 2000 800">
                            <!-- top2(橙色) -->
                            <g class="face-group" data-face="top2" transform="translate(100, 0)">
                            </g>
                            <!-- bottom2(黄色) -->
                            <g class="face-group" data-face="bottom2" transform="translate(100, 500)">
                            </g>
                            <!-- top3(紫色) -->
                            <g class="face-group" data-face="top3" transform="translate(600, 0)">
                            </g>
                            <!-- bottom3(绿色) -->
                            <g class="face-group" data-face="bottom3" transform="translate(600, 500)">
                            </g>
                            <g class="face-group" data-face="top4" transform="translate(1100, 0)">
                            </g>
                            <!-- bottom4(红色) -->
                            <g class="face-group" data-face="bottom4" transform="translate(1100, 500)">
                            </g>
                            <!-- top1(蓝色) -->
                            <g class="face-group" data-face="top1" transform="translate(1600, 0)">
                            </g>
                            <!-- bottom1(灰色) -->
                            <g class="face-group" data-face="bottom1" transform="translate(1600, 500)">
                            </g>
                        </svg>
                    </div>
                </div>

                <!-- 转角八面体视图 -->
                <div class="face-container-octa-corner" id="face-container-octa-corner" style="display: none;">
                    <div id="cornerOcta-twod-container" style="width: 100%; height: 100%; position: relative;">
                        <svg class="octahedron-2d" width="100%" height="100%" viewBox="0 0 2000 800">
                            <!-- top1(蓝色) -->
                            <g class="face-group" data-face="top1"></g>
                            <!-- top2(橙色) -->
                            <g class="face-group" data-face="top2"></g>
                            <!-- top3(紫色) -->
                            <g class="face-group" data-face="top3"></g>
                            <!-- top4(白色) -->
                            <g class="face-group" data-face="top4"></g>
                            <!-- bottom1(灰色) -->
                            <g class="face-group" data-face="bottom1"></g>
                            <!-- bottom2(黄色) -->
                            <g class="face-group" data-face="bottom2"></g>
                            <!-- bottom3(绿色) -->
                            <g class="face-group" data-face="bottom3"></g>
                            <!-- bottom4(红色) -->
                            <g class="face-group" data-face="bottom4"></g>
                        </svg>
                    </div>
                </div>

                <!-- 二阶转面八面体视图 -->
                <div class="face-container-octa-twin" id="face-container-twin-octahedron" style="display: none;">
                    <div id="twinOctahedron-twod-container" style="width: 100%; height: 100%; position: relative;">
                        <svg class="octahedron-2d" width="1200" height="600" viewBox="0 0 1200 600">
                            <!-- top2(橙色) -->
                            <g class="face-group" data-face="top2">
                            </g>
                            <!-- top3(紫色) -->
                            <g class="face-group" data-face="top3">
                            </g>
                            <!-- top4(白色) -->
                            <g class="face-group" data-face="top4">
                            </g>
                            <!-- top1(蓝色) -->
                            <g class="face-group" data-face="top1">
                            </g>
                            <!-- bottom2(黄色) -->
                            <g class="face-group" data-face="bottom2">
                            </g>
                            <!-- bottom3(绿色) -->
                            <g class="face-group" data-face="bottom3">
                            </g>
                            <!-- bottom4(红色) -->
                            <g class="face-group" data-face="bottom4">
                            </g>
                            <!-- bottom1(灰色) -->
                            <g class="face-group" data-face="bottom1">
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- 打乱公式导出区 -->
        <div class="scramble-export-section">
            <div class="export-count-label">导出公式数量：</div>
            <select class="export-count-select" id="generateCount">
                <option value="5">5</option>
                <option value="12">12</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <div class="start-id-label">起始编号：</div>
            <input type="number" class="start-id-input" id="startNumber" value="1" min="1">
            <button class="export-scramble-btn" id="exportScramblesBtn">导出打乱公式</button>
        </div>
            </div>
            
                    <!-- 移动端成绩统计关闭按钮 -->
                    <button class="stats-close-btn" id="statsCloseBtn" title="关闭成绩统计" aria-label="关闭成绩统计">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            
                        <!-- 音频元素（用于声音反馈） -->
            <audio id="beepAudio" preload="auto"></audio>


    <script src="./js/constants.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/ui-helper.js"></script>


<!-- 坐标弹出层 -->
<div class="coordinate-modal" id="coordinateModal" style="display: none;">
    <div class="coordinate-overlay" id="coordinateOverlay"></div>
    <div class="coordinate-content">
        <div class="coordinate-header">
            <h3>转动方式图示</h3>
            <button class="coordinate-close-btn" id="coordinateCloseBtn">&times;</button>
        </div>
        <div class="coordinate-body">
            <div class="coordinate-grid">
                <!-- 第1张图：转角八面体正视图 -->
                <div class="coordinate-item">
                    <div class="coordinate-label">正视图</div>
                    <img src="./pictures/Corner_Turning_Octahedron_Static.jpg" alt="转角八面体正视图" class="coordinate-image">
                </div>
                <!-- 第2-12张图：占位图 -->
                <div class="coordinate-item">
                    <div class="coordinate-label">2</div>
                    <div class="coordinate-placeholder">图片2</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">3</div>
                    <div class="coordinate-placeholder">图片3</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">4</div>
                    <div class="coordinate-placeholder">图片4</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">5</div>
                    <div class="coordinate-placeholder">图片5</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">6</div>
                    <div class="coordinate-placeholder">图片6</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">7</div>
                    <div class="coordinate-placeholder">图片7</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">8</div>
                    <div class="coordinate-placeholder">图片8</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">9</div>
                    <div class="coordinate-placeholder">图片9</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">10</div>
                    <div class="coordinate-placeholder">图片10</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">11</div>
                    <div class="coordinate-placeholder">图片11</div>
                </div>
                <div class="coordinate-item">
                    <div class="coordinate-label">12</div>
                    <div class="coordinate-placeholder">图片12</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
